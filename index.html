<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Tap Control · Sistema de ventas</title>
<link rel="icon" href="icon-192.png" />

<!-- PWA: permite "Instalar" la app en el celular -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#292118" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tap Control" />

<style>
  html, body { margin: 0; padding: 0; background: #FAF6EE; }
</style>

<!-- React (sin necesidad de instalar nada ni compilar) -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

<!-- Firebase (base de datos compartida en tiempo real) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body>
  <div id="root"></div>

  <!-- 1) Completa tus claves de Firebase en este archivo -->
  <script src="firebase-config.js"></script>

  <!-- 2) Lógica de la app -->
  <script type="text/babel" data-presets="react" src="app.js"></script>

  <!-- 3) Habilita "Instalar app" en el celular (no guarda caché, ver sw.js) -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("sw.js"));
    }
  </script>
</body>
</html>
